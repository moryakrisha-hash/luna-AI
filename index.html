<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luna AI ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --pink:#f472b6;
  --purple:#c084fc;
  --bg:#fff7fb;
  --glass:rgba(255,255,255,0.72);
  --border:rgba(244,114,182,0.2);
  --text:#4a1942;
  --muted:#94657f;
  --shadow:0 10px 40px rgba(219,39,119,0.12);
}

body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(135deg,#fff1f7,#faf5ff,#ffeef6);
  height:100vh;
  overflow:hidden;
  color:var(--text);
}

body::before,
body::after{
  content:'';
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  filter:blur(90px);
  z-index:0;
}

body::before{
  background:#f9a8d4;
  top:-100px;
  left:-100px;
}

body::after{
  background:#c4b5fd;
  bottom:-100px;
  right:-100px;
}

#app{
  position:relative;
  z-index:1;
  max-width:850px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:16px;
}

.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

/* HEADER */

header{
  padding:18px 22px;
  border-radius:28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.avatar{
  width:52px;
  height:52px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:24px;
  box-shadow:0 6px 20px rgba(219,39,119,0.3);
}

.logo h1{
  font-family:'Cormorant Garamond',serif;
  font-size:30px;
}

.logo p{
  font-size:12px;
  color:var(--muted);
}

.clear-btn{
  border:none;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:white;
  padding:10px 18px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}

/* CHAT */

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px 2px;
  display:flex;
  flex-direction:column;
  gap:18px;
  scroll-behavior:smooth;
}

#chat::-webkit-scrollbar{
  width:4px;
}

#chat::-webkit-scrollbar-thumb{
  background:#f9a8d4;
  border-radius:999px;
}

/* WELCOME */

#welcome{
  margin:auto;
  text-align:center;
  max-width:520px;
}

#welcome h2{
  font-family:'Cormorant Garamond',serif;
  font-size:54px;
  margin-bottom:10px;
}

#welcome p{
  color:var(--muted);
  line-height:1.7;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:24px;
}

.chip{
  border:none;
  padding:10px 16px;
  border-radius:999px;
  background:white;
  border:1px solid var(--border);
  color:#d63384;
  cursor:pointer;
  transition:.25s;
}

.chip:hover{
  transform:translateY(-2px);
  background:#fff0f7;
}

/* MESSAGE */

.msg{
  display:flex;
  gap:10px;
  align-items:flex-end;
  animation:fade .3s ease;
}

.user{
  flex-direction:row-reverse;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.msg-avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
}

.ai .msg-avatar{
  background:linear-gradient(135deg,var(--pink),var(--purple));
}

.user .msg-avatar{
  background:linear-gradient(135deg,#818cf8,#6366f1);
}

.bubble{
  max-width:75%;
  padding:14px 18px;
  border-radius:22px;
  line-height:1.7;
  font-size:14px;
  word-wrap:break-word;
}

.ai .bubble{
  background:white;
  border:1px solid var(--border);
}

.user .bubble{
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:white;
}

.bubble pre{
  background:#f8f0ff;
  padding:12px;
  border-radius:12px;
  overflow:auto;
  margin-top:10px;
}

.bubble code{
  font-family:monospace;
}

/* INPUT */

#input-box{
  border-radius:28px;
  padding:12px;
}

.input-row{
  display:flex;
  align-items:flex-end;
  gap:10px;
}

textarea{
  flex:1;
  border:none;
  outline:none;
  resize:none;
  background:transparent;
  font-family:inherit;
  font-size:15px;
  max-height:140px;
  padding:10px;
}

.icon-btn{
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
}

.upload{
  background:#fff0f7;
}

.send{
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:white;
  box-shadow:0 6px 20px rgba(219,39,119,0.25);
}

.hint{
  text-align:center;
  margin-top:8px;
  font-size:11px;
  color:#c08497;
}

/* TYPING */

.typing{
  display:flex;
  gap:5px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--pink);
  animation:bounce 1s infinite;
}

.dot:nth-child(2){
  animation-delay:.2s;
}

.dot:nth-child(3){
  animation-delay:.4s;
}

@keyframes bounce{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-6px);
  }
}

/* MOBILE */

@media(max-width:700px){

  #welcome h2{
    font-size:42px;
  }

  .bubble{
    max-width:90%;
  }

}

</style>
</head>
<body>

<div id="app">

<header class="glass">

<div class="logo">
<div class="avatar">🌸</div>

<div>
<h1>Luna AI</h1>
<p>Your smart AI companion ✨</p>
</div>
</div>

<button class="clear-btn" id="clear-chat">
Clear
</button>

</header>

<div id="chat">

<div id="welcome">

<h2>Hello, gorgeous ✨</h2>

<p>
I'm Luna — your beautiful AI assistant.
Ask anything, brainstorm ideas,
or just chat 💖
</p>

<div class="chips">

<button class="chip">✍️ Write a caption</button>
<button class="chip">🌸 Skincare tips</button>
<button class="chip">💌 Heartfelt message</button>
<button class="chip">🎨 Color palettes</button>
<button class="chip">📚 Book recommendations</button>
<button class="chip">💡 Creative ideas</button>

</div>

</div>

</div>

<div id="input-box" class="glass">

<div class="input-row">

<textarea
id="message"
rows="1"
placeholder="Type your message..."
></textarea>

<label class="icon-btn upload">
📎
<input type="file" hidden>
</label>

<button class="icon-btn send" id="send-btn">
➤
</button>

</div>

<div class="hint">
Powered by Groq Llama 3 ✨
</div>

</div>

</div>

<script>

/* =========================
   GROQ API KEY
========================= */

const API_KEY = "YOUR_GROQ_API_KEY_HERE";

/* ========================= */

const textarea = document.getElementById('message');
const sendBtn = document.getElementById('send-btn');
const chat = document.getElementById('chat');
const welcome = document.getElementById('welcome');
const clearBtn = document.getElementById('clear-chat');

let history = [];

/* AUTO RESIZE */

textarea.addEventListener('input', () => {

  textarea.style.height = 'auto';
  textarea.style.height = textarea.scrollHeight + 'px';

});

/* MARKDOWN */

function markdown(text){

  return text
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')

  .replace(
    /```([\s\S]*?)```/g,
    '<pre><code>$1</code></pre>'
  )

  .replace(
    /\*\*(.*?)\*\*/g,
    '<strong>$1</strong>'
  )

  .replace(
    /\*(.*?)\*/g,
    '<em>$1</em>'
  )

  .replace(
    /`([^`]+)`/g,
    '<code>$1</code>'
  )

  .replace(/\n/g,'<br>');

}

/* ADD MESSAGE */

function addMessage(role,text){

  const row = document.createElement('div');

  row.className = 'msg ' + role;

  row.innerHTML = `

  <div class="msg-avatar">
    ${role === 'ai' ? '🌸' : '👤'}
  </div>

  <div class="bubble">
    ${markdown(text)}
  </div>

  `;

  chat.appendChild(row);

  chat.scrollTop = chat.scrollHeight;

}

/* TYPING */

function typingBubble(){

  const row = document.createElement('div');

  row.className = 'msg ai';

  row.innerHTML = `

  <div class="msg-avatar">🌸</div>

  <div class="bubble typing">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  `;

  chat.appendChild(row);

  chat.scrollTop = chat.scrollHeight;

  return row;

}

/* SEND MESSAGE */

async function sendMessage(){

  const text = textarea.value.trim();

  if(!text) return;

  if(API_KEY === "YOUR_GROQ_API_KEY_HERE"){
    addMessage('ai','Please configure your Groq API key before using the chat.');
    return;
  }

  welcome.style.display = 'none';

  addMessage('user', text);

  history.push({
    role:'user',
    content:text
  });

  textarea.value = '';
  textarea.style.height = 'auto';

  const typing = typingBubble();

  try{

    const response = await fetch(
      'https://api.groq.com/openai/v1/chat/completions',
      {
        method:'POST',

        headers:{
          'Content-Type':'application/json',
          'Authorization':'Bearer ' + API_KEY
        },

        body:JSON.stringify({

          model:'llama-3.1-8b-instant', // Updated to a supported Groq model

          messages:history,

          temperature:0.8,

          max_tokens:2048

        })

      }
    );

    const data = await response.json();

    typing.remove();

    if(data.error){

      addMessage(
        'ai',
        '❌ ' + data.error.message
      );

      return;

    }

    const reply =
      data.choices[0].message.content;

    addMessage('ai', reply);

    history.push({

      role:'assistant',
      content:reply

    });

  }

  catch(error){

    typing.remove();

    addMessage(
      'ai',
      '❌ Error: ' + error.message
    );

  }

}

/* SEND BUTTON */

sendBtn.addEventListener(
  'click',
  sendMessage
);

/* ENTER KEY */

textarea.addEventListener(
  'keydown',
  e => {

    if(e.key === 'Enter' && !e.shiftKey){

      e.preventDefault();

      sendMessage();

    }

  }
);

/* CLEAR CHAT */

clearBtn.onclick = () => {

  history = [];

  chat.innerHTML = '';

  chat.appendChild(welcome);

  welcome.style.display = 'block';

};

/* SUGGESTIONS */

document
.querySelectorAll('.chip')
.forEach(chip => {

  chip.addEventListener(
    'click',
    () => {

      textarea.value = chip.innerText;

      textarea.focus();

    }
  );

});

</script>

</body>
</html>
